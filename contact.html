<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flipkart Clone</title>
<link rel="icon" type="image/png" href="images/image copy 2.png">

<style>
/* ===== PAGE BACKGROUND (Flipkart style light grey) ===== */
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#92b5ea;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* ===== CONTAINER CARD ===== */
.contact-right{
    width:100%;
    max-width:420px;
    padding:20px;
}

/* ===== FORM CARD ===== */
#contact-form{
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(228, 119, 119, 0.1);
    display:flex;
    flex-direction:column;
    gap:15px;
    transition:0.3s;
}

/* Hover like Flipkart card */
#contact-form:hover{
    box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

/* ===== INPUTS ===== */
#contact-form input,
#contact-form textarea{
    width:100%;
    padding:12px 8px;
    border:1px solid #5190c7;
    border-radius:10px;
    font-size:14px;
    outline:none;
    transition:0.2s;
    box-shadow: #0b57d0;
}

#contact-form input:focus,
#contact-form textarea:focus{
    border-color:#2874f0;
    box-shadow:0 0 5px rgba(40,116,240,0.3);
}

/* ===== TEXTAREA ===== */
#contact-form textarea{
    min-height:120px;
    resize:none;
}

/* ===== BUTTON ===== */
#contact-form button{
    background:#2874f0;
    color:#fff;
    border:none;
    padding:12px;
    border-radius:6px;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

#contact-form button:hover{
    background:#0b57d0;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
    .contact-right{
        padding:15px;
    }
}

@media(max-width:480px){
    #contact-form{
        padding:30px;
    }

    #contact-form input,
    #contact-form textarea{
        font-size:13px;
    }

    #contact-form button{
        font-size:14px;
    }
}
</style>

</head>

<body>

<div class="contact-right">
    <form id="contact-form">

        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message" required></textarea>

        <button type="submit">Send Message</button>

    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function () {
    emailjs.init("8VVvXDbVcYHYTK78x");
})();
</script>

<script src="js/contact.js"></script>

</body>
</html>
