<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Delivery Address</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f3f6;
            margin: 0;
            padding: 0;
        }

        .address-container {
            max-width: 500px;
            margin: 50px auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2874f0;
        }

        select,
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2874f0;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover {
            background: #0f5bd6;
        }
    </style>
</head>

<body>

    <div class="address-container">

        <h2>Delivery Address</h2>

        <select id="country" aria-label="Country" title="Country">
            <option value="">Select Country</option>
        </select>

        <select id="state" aria-label="State" title="State">
            <option value="">Select State</option>
        </select>

        <input type="text" id="city" placeholder="City">

        <input type="text" id="pincode" placeholder="Pincode">

        <input type="text" id="address" placeholder="Full Address">

        <button onclick="goToPayment()">Continue to Payment</button>

    </div>

    <script>
        // LOAD COUNTRIES
        async function loadCountries() {

            let res = await fetch("https://countriesnow.space/api/v0.1/countries/positions");
            let data = await res.json();

            let countrySelect = document.getElementById("country");

            data.data.forEach(c => {
                countrySelect.innerHTML += `<option value="${c.name}">${c.name}</option>`;
            });
        }

        // LOAD STATES ON COUNTRY CHANGE
        document.getElementById("country").addEventListener("change", async function () {

            let country = this.value;

            let res = await fetch("https://countriesnow.space/api/v0.1/countries/states", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ country })
            });

            let data = await res.json();

            let stateSelect = document.getElementById("state");
            stateSelect.innerHTML = `<option value="">Select State</option>`;

            data.data.states.forEach(s => {
                stateSelect.innerHTML += `<option value="${s.name}">${s.name}</option>`;
            });
        });

        // CONTINUE TO PAYMENT
        function goToPayment() {

            let addressData = {
                country: document.getElementById("country").value,
                state: document.getElementById("state").value,
                city: document.getElementById("city").value,
                pincode: document.getElementById("pincode").value,
                address: document.getElementById("address").value
            };

            // validation
            if (!addressData.country || !addressData.state || !addressData.city || !addressData.pincode) {
                alert("Please fill all required fields");
                return;
            }

            localStorage.setItem("address", JSON.stringify(addressData));

            window.location.href = "payment.html";
        }

        loadCountries();
    </script>
    <script src="js/address.js"></script>

</body>

</html>
