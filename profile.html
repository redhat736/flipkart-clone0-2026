<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        .profile-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        .profile-card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,.1);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #2874f0;
            color: white;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-info h2 {
            margin-bottom: 5px;
        }

        .profile-details {
            display: grid;
            gap: 15px;
        }

        .detail-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
        }

        .detail-box label {
            font-weight: 600;
            color: #555;
            display: block;
            margin-bottom: 5px;
        }

        .btn-group {
            margin-top: 25px;
            display: flex;
            gap: 15px;
        }

        .btn {
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            font-weight: 600;
        }

        .edit-btn {
            background: #2874f0;
        }

        .logout-btn {
            background: #e53935;
        }
    </style>
</head>

<body>

    <header>
        <nav class="navbar">

            <div class="logo">
                <h2>
                    Flipkart
                    <a href="index.html">
                        <img src="Images/image copy 2.png" alt="">
                    </a>
                </h2>
            </div>

        </nav>
    </header>

    <div class="profile-container">

        <div class="profile-card">

            <div class="profile-header">

                <div class="avatar" id="avatar">
                    R
                </div>

                <div class="user-info">
                    <h2 id="profileName">User Name</h2>
                    <p id="profileEmail">user@gmail.com</p>
                </div>

            </div>

            <div class="profile-details">

                <div class="detail-box">
                    <label>Full Name</label>
                    <span id="fullName">User Name</span>
                </div>

                <div class="detail-box">
                    <label>Email Address</label>
                    <span id="email">user@gmail.com</span>
                </div>

            </div>

            <div class="btn-group">

                <button class="btn edit-btn"
                    onclick="window.location.href='address.html'">
                    Manage Address
                </button>

                <button class="btn logout-btn"
                    onclick="logoutUser()">
                    Logout
                </button>

            </div>

        </div>

    </div>

    <script>

        document.addEventListener("DOMContentLoaded", () => {

    const user = JSON.parse(localStorage.getItem("user"));

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    document.getElementById("profileName").innerText = user.name;
    document.getElementById("fullName").innerText = user.name;

    document.getElementById("profileEmail").innerText = user.email;
    document.getElementById("email").innerText = user.email;

    document.getElementById("avatar").innerText =
        user.name.charAt(0).toUpperCase();
});

function logoutUser() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
}

</script>
<!-- <script src="js/auth-guard.js"></script> -->
</body>

</html>
